{% extends "base.html" %}

{% block title %}用户注册 - 校园失物招领平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">用户注册</h3>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">验证码</label>
                        <div class="d-flex">
                            <input type="text" class="form-control me-2" name="captcha" required placeholder="请输入验证码">
                            <div class="bg-light p-2 rounded" style="min-width: 120px; text-align: center; font-family: monospace; font-size: 18px; letter-spacing: 2px; border: 1px solid #dee2e6;">
                                {{ captcha }}
                            </div>
                        </div>
                        <small class="text-muted">大小写不敏感</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">注册</button>
                </form>
                <div class="text-center mt-3">
                    <p>已有账号？<a href="{{ url_for('user.login') }}">立即登录</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
