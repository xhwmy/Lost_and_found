{% extends "base.html" %}

{% block title %}修改个人信息 - 校园失物招领平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">修改个人信息</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">真实姓名</label>
                        <input type="text" class="form-control" name="real_name" 
                               value="{{ user.real_name or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="text" class="form-control" name="phone" 
                               value="{{ user.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">学号</label>
                        <input type="text" class="form-control" name="student_id" 
                               value="{{ user.student_id or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">身份证号</label>
                        <input type="text" class="form-control" name="id_card_number" 
                               value="{{ user.id_card_number or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">学校</label>
                        <input type="text" class="form-control" name="school" 
                               value="{{ user.school or '' }}">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('user.profile') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
