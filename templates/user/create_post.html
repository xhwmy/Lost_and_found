{% extends "base.html" %}

{% block title %}发帖 - 校园众筹平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">发表新帖</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">帖子标题 *</label>
                        <input type="text" class="form-control" name="title" required maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分类（可选）</label>
                        <select class="form-select" name="category">
                            <option value="">无分类</option>
                            <option value="求助">求助</option>
                            <option value="分享">分享</option>
                            <option value="讨论">讨论</option>
                            <option value="建议">建议</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">帖子内容 *</label>
                        <textarea class="form-control" name="content" rows="8" required></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('user.forum') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">发布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
