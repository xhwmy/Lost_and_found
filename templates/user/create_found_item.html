{% extends "base.html" %}

{% block title %}发布招领信息 - 校园失物招领平台{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">发布招领信息</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">标题 *</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">详细描述 *</label>
                        <textarea class="form-control" id="description" name="description" rows="5" required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">物品分类 *</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">请选择分类</option>
                                <option value="电子产品">电子产品</option>
                                <option value="证件">证件</option>
                                <option value="书籍">书籍</option>
                                <option value="衣物">衣物</option>
                                <option value="钱包">钱包</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">拾取地点 *</label>
                            <input type="text" class="form-control" id="location" name="location" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="found_time" class="form-label">拾取时间</label>
                        <input type="date" class="form-control" id="found_time" name="found_time">
                    </div>
                    
                    <div class="mb-3">
                        <label for="image" class="form-label">物品图片</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('user.found_items') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-success">发布招领信息</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
