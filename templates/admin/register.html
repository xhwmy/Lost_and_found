{% extends "admin/base.html" %}

{% block title %}创建管理员账号 - 校园失物招领平台{% endblock %}

{% block page_title %}创建管理员账号{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">创建新管理员账号</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> <strong>注意：</strong>只有已登录的管理员才能创建新的管理员账号
                </div>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">用户名 *</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱 *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">真实姓名</label>
                        <input type="text" class="form-control" name="real_name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码 *</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码 *</label>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">验证码 *</label>
                        <div class="d-flex">
                            <input type="text" class="form-control me-2" name="captcha" required placeholder="请输入验证码" style="text-transform: uppercase;">
                            <div class="bg-light p-2 rounded" style="min-width: 120px; text-align: center; font-family: monospace; font-size: 18px; letter-spacing: 2px; border: 1px solid #dee2e6;">
                                {{ captcha }}
                            </div>
                        </div>
                        <small class="text-muted">大小写不敏感</small>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">创建管理员</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
