{% extends "admin/base.html" %}

{% block page_title %}发布帖子{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">发布新帖子</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">标题 *</label>
                        <input type="text" class="form-control" name="title" required 
                               placeholder="请输入帖子标题">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">分类</label>
                        <select class="form-select" name="category">
                            <option value="">选择分类（可选）</option>
                            <option value="公告通知">公告通知</option>
                            <option value="项目推荐">项目推荐</option>
                            <option value="经验分享">经验分享</option>
                            <option value="问答答疑">问答答疑</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">内容 *</label>
                        <textarea class="form-control" name="content" rows="10" required
                                  placeholder="请输入帖子内容..."></textarea>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> 
                        <strong>提示：</strong>您以管理员身份发布的帖子将带有"管理员"标识
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.forum') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">发布帖子</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
