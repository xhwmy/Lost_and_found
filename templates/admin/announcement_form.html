{% extends "admin/base.html" %}

{% block page_title %}{% if announcement %}修改公告{% else %}发布公告{% endif %}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">公告标题</label>
                <input type="text" class="form-control" name="title" 
                       value="{{ announcement.title if announcement else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">公告内容</label>
                <textarea class="form-control" name="content" rows="6" required>{{ announcement.content if announcement else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">优先级（数字越大优先级越高）</label>
                <input type="number" class="form-control" name="priority" 
                       value="{{ announcement.priority if announcement else 0 }}" min="0">
            </div>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin.announcements') }}" class="btn btn-secondary">返回</a>
                <button type="submit" class="btn btn-primary">
                    {% if announcement %}保存修改{% else %}发布公告{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
