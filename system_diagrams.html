<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园失物招领系统 - 系统图表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">校园失物招领系统 - 系统图表</h1>
        
        <div class="mb-6">
            <h2 class="text-center mb-3">1. 实体关系图 (ER图)</h2>
            <div class="text-center">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Entity%20Relationship%20Diagram%20for%20Campus%20Lost%20and%20Found%20System%2C%20showing%20entities%20User%2C%20LostItem%2C%20FoundItem%2C%20Claim%2C%20ThreadComment%2C%20Favorite%2C%20Notification%2C%20ForumPost%2C%20ForumReply%2C%20Admin%2C%20Announcement%2C%20OperationLog%2C%20IPBan%2C%20SecurityRule%2C%20IPWhitelist%20with%20relationships%2C%20professional%20database%20diagram%2C%20clear%20connections%2C%20color%20coded%20entities&image_size=landscape_16_9" 
                     alt="校园失物招领系统ER图" 
                     class="img-fluid rounded shadow" 
                     style="max-width: 100%; height: auto;">
            </div>
        </div>
        
        <div class="mb-6">
            <h2 class="text-center mb-3">2. 用例图</h2>
            <div class="text-center">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Use%20Case%20Diagram%20for%20Campus%20Lost%20and%20Found%20System%2C%20showing%20actors%20Regular%20User%2C%20Admin%2C%20System%20and%20use%20cases%20like%20Register%20Login%2C%20Post%20Information%2C%20Search%20Information%2C%20Claim%20Item%2C%20Personal%20Center%2C%20Favorite%2C%20Forum%20Post%2C%20Comment%2C%20User%20Management%2C%20Content%20Review%2C%20Forum%20Management%2C%20Security%20Management%2C%20Announcement%2C%20AI%20Review%2C%20Security%20Monitoring%2C%20professional%20UML%20diagram%2C%20clear%20relationships%2C%20color%20coded%20actors%20and%20use%20cases&image_size=landscape_16_9" 
                     alt="校园失物招领系统用例图" 
                     class="img-fluid rounded shadow" 
                     style="max-width: 100%; height: auto;">
            </div>
        </div>
        
        <div class="mt-6 p-4 bg-light rounded shadow">
            <h3>图表说明</h3>
            <ul class="list-unstyled">
                <li class="mb-2"><strong>ER图</strong>：展示了系统中的实体及其关系，包括用户、失物、招领、认领、评论、收藏、通知、论坛帖子、回复、管理员、公告、操作日志、IP封禁、安全规则和IP白名单等实体。</li>
                <li class="mb-2"><strong>用例图</strong>：展示了系统的角色和用例，包括普通用户、管理员和系统三个角色，以及注册登录、发布信息、搜索信息、认领、个人中心、收藏、论坛发帖、评论、用户管理、内容审核、论坛管理、安全管理、发布公告、AI审核和安全监控等用例。</li>
            </ul>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
