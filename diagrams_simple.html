<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园失物招领系统 - 图表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        h2 {
            color: #555;
            margin-top: 30px;
        }
        .image-container {
            text-align: center;
            margin: 20px 0;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .description {
            margin-top: 30px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>校园失物招领系统 - 系统图表</h1>
        
        <h2>1. 实体关系图 (ER图)</h2>
        <div class="image-container">
            <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Campus%20Lost%20and%20Found%20System%20ER%20Diagram%2C%20entities%20User%2C%20LostItem%2C%20FoundItem%2C%20Claim%2C%20Comments%2C%20Favorites%2C%20Forum%2C%20Admin&image_size=landscape_16_9" alt="ER图">
        </div>
        
        <h2>2. 用例图</h2>
        <div class="image-container">
            <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Campus%20Lost%20and%20Found%20System%20Use%20Case%20Diagram%2C%20actors%20User%2C%20Admin%2C%20System%2C%20use%20cases%20Register%2C%20Login%2C%20Post%2C%20Search%2C%20Claim%2C%20Manage&image_size=landscape_16_9" alt="用例图">
        </div>
        
        <div class="description">
            <h3>图表说明</h3>
            <p><strong>ER图</strong>：展示了系统中的实体及其关系，包括用户、失物、招领、认领、评论、收藏、论坛等实体。</p>
            <p><strong>用例图</strong>：展示了系统的角色和用例，包括普通用户、管理员和系统三个角色，以及注册登录、发布信息、搜索信息、认领、管理等用例。</p>
        </div>
    </div>
